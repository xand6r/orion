services:
  orion:
    build: .
    container_name: orion
    restart: unless-stopped
    tty: true
    stdin_open: true
    env_file:
      - .env
    environment:
      APP_CONFIG_PATH: /app/config/app.docker.json
      # Force color for pino-pretty / banner green dot
      FORCE_COLOR: "1"
    ports:
      - "8080:8080"
    volumes:
      - orion-data:/data
      # Optional: override scoring without rebuilding
      # - ./config/scoring.v4.json:/app/config/scoring.v4.json:ro
    networks:
      - orion

volumes:
  orion-data:

networks:
  orion:
    driver: bridge
